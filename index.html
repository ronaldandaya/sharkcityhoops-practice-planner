<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCH Planner">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="theme-color" content="#0A0A0A">
<title>Shark City Hoops Practice Planner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap');
:root{
  --bk:#0A0A0A;--bk2:#111;--card:#1A1A1A;--card2:#222;--brd:#2A2A2A;
  --tl:#00897B;--tlb:#00BFA5;--tlg:rgba(0,191,165,.18);--tld:rgba(0,137,123,.25);
  --g1:#F0F0F0;--g3:#BDBDBD;--g4:#9E9E9E;--g5:#757575;--g6:#616161;--g7:#424242;--g8:#303030;
  --or:#FF6D00;--wh:#FFF;--red:#EF4444;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;height:100%}
body{font-family:'Source Sans 3',system-ui,-apple-system,sans-serif;background:var(--bk);color:var(--g1);min-height:100%;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
h1,h2,h3,h4{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1.5px}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-appearance:none}
input,select{font-family:inherit;outline:none;-webkit-appearance:none;border:none}
.stripe{background:linear-gradient(90deg,var(--tl),transparent);height:3px}
.hdr{background:linear-gradient(180deg,#111,#0A0A0A);padding:calc(var(--st) + 10px) 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--tl);position:sticky;top:0;z-index:100}
.lg{display:flex;align-items:center;gap:10px}
.lg img{width:52px;height:52px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(0,191,165,.3))}
.lg h1{font-size:15px;color:var(--tlb);margin:0;line-height:1.15;text-shadow:0 0 12px rgba(0,191,165,.3)}
.lg .s{font-size:10px;color:var(--g5);letter-spacing:3px;font-family:'Oswald',sans-serif;font-weight:400}
.hb{display:flex;gap:6px}
.bs{padding:8px 14px;border-radius:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;transition:all .15s}
.bt{background:var(--tl);color:var(--wh)}.bt:active{background:var(--tlb);transform:scale(.96)}
.bo{background:var(--or);color:var(--wh)}.bo:active{opacity:.85;transform:scale(.96)}
.tabs{display:flex;background:var(--bk2);border-bottom:1px solid var(--brd);position:sticky;top:72px;z-index:99}
.tab{flex:1;text-align:center;padding:12px 8px;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--g6);background:transparent;transition:all .2s;border-bottom:3px solid transparent}
.tab.on{color:var(--tlb);border-bottom-color:var(--tlb)}
.badge{display:inline-block;background:var(--or);color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;margin-left:4px;font-family:'Source Sans 3',sans-serif;font-weight:700}
.mn{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--sb) + 20px)}
.vw{display:none}.vw.on{display:block}
.sw{position:sticky;top:0;z-index:10;padding:12px 14px 8px;background:linear-gradient(var(--bk) 85%,transparent)}
.sb{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:0 14px}
.sb svg{flex-shrink:0;opacity:.35}
.sb input{flex:1;background:transparent;color:var(--g1);padding:11px 0;font-size:15px}
.sb input::placeholder{color:var(--g6)}
.pills{display:flex;gap:6px;padding:2px 14px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;background:var(--card);color:var(--g5);border:1px solid var(--brd);text-transform:uppercase;letter-spacing:1px;transition:all .2s;white-space:nowrap}
.pill.on{background:var(--tl);color:var(--wh);border-color:var(--tl)}
.dl{padding:0 10px 20px}
.dc{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:14px 16px;margin-bottom:8px;transition:all .15s}
.dc:active{background:var(--card2)}
.dc.ip{border-left:3px solid var(--tlb)}
.dct{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.dcn{font-family:'Oswald',sans-serif;font-size:14px;color:var(--wh);letter-spacing:.5px}
.dcd{font-size:12px;color:var(--tlb);font-weight:700;white-space:nowrap}
.dcm{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
.ddet{font-size:11px;color:var(--g5);cursor:pointer;text-decoration:underline;padding:2px 0;letter-spacing:.5px}
.ddet:active{color:var(--tlb)}
.dcr{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qab{width:32px;height:32px;border-radius:8px;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.qab.add{background:var(--tld);color:var(--tlb)}.qab.add:active{background:var(--tl);color:var(--wh)}
.qab.rm{background:rgba(239,68,68,.12);color:var(--red);font-size:14px}.qab.rm:active{background:var(--red);color:#fff}
.cust{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(255,109,0,.15);color:var(--or);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.qdl{background:none;color:var(--g6);font-size:11px;padding:2px 4px;margin-left:6px}.qdl:active{color:var(--red)}
.tg{font-size:10px;padding:2px 8px;border-radius:5px;background:var(--g8);color:var(--g4);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.tg.ct{background:var(--tld);color:var(--tlb)}
.dsc{font-size:13px;color:var(--g4);line-height:1.55;margin-top:10px;padding-top:10px;border-top:1px solid var(--brd);display:none}
.dsc.sh{display:block}
.dca{display:none}
.dc.ex .dca{display:flex}
.dca{display:flex;gap:6px;margin-top:10px}
.db{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.8px;transition:all .15s}
.dba{background:var(--tl);color:var(--wh)}.dba:active{background:var(--tlb)}
.dbr{background:var(--red);color:var(--wh)}
.ps{padding:12px 14px}
.pm{background:var(--card);border-radius:10px;padding:16px;border:1px solid var(--brd);margin-bottom:10px}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf label{display:block;font-size:10px;color:var(--g5);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;font-weight:700}
.mf input,.mf select{width:100%;background:var(--g8);color:var(--g1);padding:10px 12px;border-radius:8px;font-size:14px;border:1px solid var(--brd)}
.mf.fl{grid-column:1/-1}
.duc{display:flex;align-items:center;gap:12px;justify-content:center;background:var(--card);border-radius:10px;padding:14px 16px;border:1px solid var(--brd);margin-bottom:10px}
.dul{font-family:'Oswald',sans-serif;font-size:12px;color:var(--g5);letter-spacing:2px}
.duv{font-family:'Oswald',sans-serif;font-size:32px;color:var(--tlb);min-width:55px;text-align:center}
.duu{font-size:11px;color:var(--g6);letter-spacing:1px}
.dub{width:38px;height:38px;border-radius:50%;background:var(--tld);color:var(--tlb);font-size:22px;display:flex;align-items:center;justify-content:center;font-weight:700}
.dub:active{background:var(--tl);color:var(--wh)}
.pe{text-align:center;padding:50px 20px;color:var(--g6)}
.pe .i{font-size:44px;margin-bottom:10px;opacity:.6}
.pe .t{font-family:'Oswald',sans-serif;font-size:17px;color:var(--g5);letter-spacing:2px}
.pe .u{font-size:13px;margin-top:6px;max-width:260px;margin-left:auto;margin-right:auto;line-height:1.5}
.pds{min-height:60px}
.pi{background:var(--card);border-radius:10px;padding:12px 14px;margin-bottom:6px;border:1px solid var(--brd);display:flex;align-items:center;gap:10px}
.pia{display:flex;flex-direction:column;gap:1px}
.par{background:none;color:var(--g6);font-size:11px;padding:2px 4px;line-height:1}
.par:active{color:var(--tlb)}
.pn{width:26px;height:26px;border-radius:50%;background:var(--tld);color:var(--tlb);font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pb{flex:1;min-width:0}
.pnm{font-family:'Oswald',sans-serif;font-size:13px;color:var(--wh);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pct{font-size:10px;color:var(--tlb);text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.pdr{display:flex;align-items:center;gap:3px;flex-shrink:0}
.pdr input{width:40px;background:var(--g8);color:var(--tlb);text-align:center;padding:4px;border-radius:6px;font-size:14px;font-weight:700;border:1px solid var(--brd)}
.pdr span{font-size:10px;color:var(--g6)}
.prm{width:26px;height:26px;border-radius:6px;background:rgba(239,68,68,.12);color:var(--red);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prm:active{background:var(--red);color:#fff}
.pdt{font-size:12px;color:var(--g4);line-height:1.5;margin-top:6px;padding-top:6px;border-top:1px dashed var(--brd);display:none}
.pdt.sh{display:block}
.psu{background:linear-gradient(135deg,rgba(0,137,123,.12),rgba(0,191,165,.06));border:1px solid rgba(0,191,165,.25);border-radius:10px;padding:14px 16px;margin-top:6px;display:flex;justify-content:space-between;align-items:center}
.psl{font-size:11px;color:var(--g5);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.psv{font-family:'Oswald',sans-serif;font-size:26px;color:var(--tlb)}
.psw{color:var(--or)}
/* Sticky plan counter bar on Drills tab */
.plan-bar{position:sticky;bottom:0;left:0;right:0;z-index:50;background:linear-gradient(135deg,#111,#1A1A1A);border-top:2px solid var(--tl);padding:10px 14px;display:none;align-items:center;justify-content:space-between;gap:10px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.plan-bar.vis{display:flex}
.plan-bar .pb-info{display:flex;align-items:center;gap:10px}
.plan-bar .pb-count{font-family:'Oswald',sans-serif;font-size:14px;color:var(--tlb);letter-spacing:1px}
.plan-bar .pb-time{font-family:'Oswald',sans-serif;font-size:22px;color:var(--wh);letter-spacing:1px}
.plan-bar .pb-unit{font-size:10px;color:var(--g5);letter-spacing:1px}
.plan-bar .pb-btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;background:var(--tl);color:var(--wh)}
.plan-bar .pb-btn:active{background:var(--tlb);transform:scale(.96)}
/* Drag-and-drop plan items */
.pi{transition:transform .15s,box-shadow .15s,opacity .15s}
.pi.dragging{opacity:.7;box-shadow:0 8px 24px rgba(0,191,165,.25);transform:scale(1.02);z-index:10;position:relative}
.pi.drag-over{border-top:2px solid var(--tlb)}
.pi .drag-handle{cursor:grab;touch-action:none;padding:4px 2px;color:var(--g6);font-size:14px;display:flex;align-items:center;user-select:none;-webkit-user-select:none}
.pi .drag-handle:active{color:var(--tlb);cursor:grabbing}
/* Push-to-top / drop-to-bottom shortcut buttons */
.pi .jump-btns{display:flex;flex-direction:column;gap:1px}
.pi .jmp{background:none;color:var(--g7);font-size:9px;padding:1px 3px;line-height:1;letter-spacing:.5px;font-weight:700}
.pi .jmp:active{color:var(--tlb)}
.pi .jmp.dis{opacity:.2;pointer-events:none}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.mo.op{display:flex}
.md{background:var(--card);border-radius:16px 16px 0 0;border-top:2px solid var(--tl);width:100%;max-width:480px;padding:24px 20px calc(var(--sb) + 24px);animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.md h3{font-size:18px;color:var(--tlb);margin-bottom:16px;text-align:center}
.mb{width:100%;padding:14px;border-radius:10px;margin-bottom:8px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.mp{background:var(--tl);color:var(--wh)}.mp:active{background:var(--tlb)}
.ms{background:var(--g8);color:var(--g3);border:1px solid var(--brd)}.ms:active{background:var(--g7)}
.mc{width:100%;padding:12px;border-radius:10px;margin-top:4px;background:transparent;color:var(--g6);font-size:13px;font-weight:600}
#err{display:none;background:#EF4444;color:#fff;padding:10px;text-align:center;font-size:12px}
.rh{background:linear-gradient(135deg,#111,#1A1A1A);border:1px solid var(--brd);border-radius:12px;padding:16px;margin-bottom:12px}
.rht{display:flex;justify-content:space-between;align-items:flex-start}
.rhl{font-size:10px;color:var(--g5);text-transform:uppercase;letter-spacing:2px;font-weight:700}
.rhv{font-family:'Oswald',sans-serif;font-size:36px;color:var(--tlb);letter-spacing:2px}
.rhr{font-size:24px;color:var(--g4)}
.rpb{width:100%;height:6px;background:var(--g8);border-radius:3px;margin-top:10px;overflow:hidden}
.rpf{height:100%;background:linear-gradient(90deg,var(--tl),var(--tlb));border-radius:3px;transition:width .5s}
.rb{padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;flex:1;text-align:center;transition:all .15s}
.rbs{background:var(--tl);color:var(--wh)}.rbs:active{background:var(--tlb)}
.rbe{background:var(--red);color:var(--wh)}.rbe:active{opacity:.85}
.rbs.pau{background:var(--or)}
.ri{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:8px;transition:all .2s}
.ri.act{border-color:var(--tlb);background:linear-gradient(135deg,rgba(0,137,123,.08),var(--card))}
.ri.dn{opacity:.5}
.ri.dn .rin{text-decoration:line-through;color:var(--g6)}
.rit{display:flex;align-items:center;gap:10px}
.ric{width:28px;height:28px;border-radius:8px;border:2px solid var(--brd);background:var(--g8);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;cursor:pointer;transition:all .15s;color:transparent}
.ric.chk{background:var(--tl);border-color:var(--tl);color:var(--wh)}
.rib{flex:1;min-width:0}
.rin{font-family:'Oswald',sans-serif;font-size:14px;color:var(--wh);letter-spacing:.5px}
.rict{font-size:10px;color:var(--tlb);text-transform:uppercase;font-weight:600}
.rtm{text-align:right;flex-shrink:0}
.rtv{font-family:'Oswald',sans-serif;font-size:20px;color:var(--tlb)}
.rtv.wrn{color:var(--or)}
.rtv.exp{color:var(--red)}
.rtl{font-size:10px;color:var(--g6);text-transform:uppercase}
.rta{display:flex;gap:6px;margin-top:8px;margin-left:38px}
.rtb{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;transition:all .15s}
.rtbs{background:var(--tl);color:var(--wh)}.rtbs:active{background:var(--tlb)}
.rtbp{background:var(--or);color:var(--wh)}
.rtbr{background:var(--g8);color:var(--g4);border:1px solid var(--brd)}.rtbr:active{background:var(--g7)}
.rtbn{background:var(--tld);color:var(--tlb)}.rtbn:active{background:var(--tl);color:var(--wh)}
.rnt{width:100%;margin-top:8px;margin-left:38px;max-width:calc(100% - 38px);background:var(--g8);color:var(--g3);border:1px solid var(--brd);border-radius:6px;padding:8px 10px;font-size:12px;font-family:inherit;resize:vertical}
.rnt::placeholder{color:var(--g6)}
.rsm{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:20px;margin-top:12px}
.rsm h3{font-family:'Oswald',sans-serif;color:var(--tlb);font-size:18px;margin-bottom:14px;letter-spacing:2px}
.rsr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--brd);font-size:13px}
.rsr span:first-child{color:var(--g4)}.rsr span:last-child{color:var(--wh);font-weight:600}
.rsn{margin-top:12px}
.rsn label{display:block;font-size:10px;color:var(--g5);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;font-weight:700}
.rsn textarea{width:100%;background:var(--g8);color:var(--g1);border:1px solid var(--brd);border-radius:8px;padding:10px;font-size:13px;font-family:inherit;resize:vertical}
.rsx{display:flex;gap:8px;margin-top:14px}
.rsx button{flex:1}
.gp{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.gp .pill{margin:0}
.gp .pill.on{background:var(--tl);color:var(--wh);border-color:var(--tl)}
.gs{width:100%;padding:10px 12px;background:var(--g8);color:var(--g1);border:1px solid var(--brd);border-radius:8px;font-size:14px;font-family:inherit}
.gs:focus{border-color:var(--tl)}
.gl{display:block;font-size:10px;color:var(--g5);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:700}
.gg{margin-bottom:14px}
.grd{display:flex;gap:8px}
.grd>div{flex:1}
.gpre{background:var(--g8);border:1px solid var(--brd);border-radius:8px;padding:12px;margin-bottom:14px}
.gpre h4{font-size:11px;color:var(--tlb);margin-bottom:8px;letter-spacing:1.5px}
.gpre .gpb{display:flex;justify-content:space-between;font-size:12px;color:var(--g4);padding:3px 0}
.gpre .gpb span:last-child{color:var(--tlb);font-weight:700}
@media(min-width:768px){
  .tabs{display:none}
  .mn{display:flex;overflow:hidden}
  .vw{display:block!important;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .vw-l{max-width:440px;border-right:1px solid var(--brd)}
  .vw-p{flex:1}
  .md{border-radius:16px;margin-bottom:40px}
  .mo{align-items:center}
  .hdr{padding:12px 20px}
  .lg img{width:60px;height:60px}
  .lg h1{font-size:18px}
}
@media print{
  body{background:#fff!important;color:#111!important}
  .hdr,.tabs,.sw,.pills,.dca,.dub,.prm,.pia,.psu,.mo,.stripe,#err{display:none!important}
  .vw{display:block!important}.vw-l{display:none!important}
  .pi{background:#f8f8f8!important;border:1px solid #ddd!important;color:#111!important}
  .pnm{color:#111!important}.pct{color:#00897B!important}
  .pdr input{color:#00897B!important;background:#eee!important}
  .pm{background:#f8f8f8!important;border:1px solid #ddd!important}
  .mf input{background:#fff!important;color:#111!important;border:1px solid #ccc!important}
  .mf label{color:#555!important}.ps{padding:0!important}
  .pn{background:rgba(0,137,123,.15)!important;color:#00897B!important}
}
</style>
</head>
<body>
<div class="stripe"></div>
<div id="err"></div>

<script>
try{
var D=[
{i:"w1",n:"Dynamic Stretching Circuit",c:"Warmup",d:8,v:"Low",p:"All",t:"High knees, butt kicks, leg swings, arm circles, lateral shuffles. Baseline to baseline, each movement one full length. 2 sets."},
{i:"w2",n:"Layup Lines (2-Line)",c:"Warmup",d:6,v:"Low",p:"All",t:"Two lines: one shooting, one rebounding. Alternate right and left hand layups. Right-hand = left foot plant. Soft finish off glass."},
{i:"w6",n:"Static Stretch Circuit",c:"Warmup",d:8,v:"Low",p:"All",t:"Hold each stretch 20-30 sec: quad pull, hamstring reach, hip flexor lunge, calf stretch, shoulder cross-body, tricep overhead. Both sides. Breathe through each hold."},
{i:"w3",n:"3-Man Weave",c:"Full Court",d:7,v:"Medium",p:"3+",t:"Three players weave down court passing without dribbling. Middle starts with ball, passes to wing, goes behind. Finish with layup."},
{i:"fc1",n:"3 Lane Rush",c:"Full Court",d:10,v:"High",p:"3+",t:"3 lane fast break drill. Ball does not touch the floor until the bounce pass for the finish. Push pace, fill lanes wide, hit the finisher in stride. Goal: 50 makes in 5 minutes."},
{i:"fc2",n:"5 Line 3 Man Weave 2 Defender",c:"Full Court",d:10,v:"High",p:"5+",t:"5 lines on baseline. Middle 3 lines execute the weave going down court. Edge lines sprint to the far corner then run back to play defense before the 3 weave returns. Transition offense vs defense."},
{i:"fc3",n:"5v4 Disadvantage",c:"Full Court",d:10,v:"High",p:"9+",t:"5 on offense vs 4 defenders full court. Offense must push pace and exploit the numbers advantage. Rotate defense in. Builds fast break decision-making and defensive rotation."},
{i:"w4",n:"Partner Passing",c:"Passing",d:6,v:"Low",p:"Pairs",t:"Partners 12-15 ft apart. Chest pass, bounce pass, overhead pass, one-hand push pass. 10 reps each. Emphasize targets."},
{i:"ps1",n:"Full Court Partner Passing",c:"Passing",d:8,v:"Medium",p:"Pairs",t:"Partners slide full court about 10-15 feet apart. Chest pass, bounce pass, overhead pass, sprint pass, one-hand push pass. Down and back. Stay in rhythm, hit your partner in the chest."},
{i:"ps2",n:"Shooting Star",c:"Passing",d:12,v:"High",p:"8+",t:"Lines at baseline, corners, and wings. Pass across after a dribble drive and paint touch. Passer closes out on receiver. Catcher works on catch and rip to paint touch. Drive with intensity. Players call for ball. One wing line becomes the shooting line. Progression: layups, mid range, 3 pointers."},
{i:"w5",n:"Full-Court Dribble",c:"Ball Handling",d:6,v:"Low",p:"All",t:"Down and back: right hand, left hand, crossover at FT lines, behind back at half. Stay low, eyes up."},
{i:"b1",n:"Stationary Ball Handling Series",c:"Ball Handling",d:8,v:"Medium",p:"All",t:"Each player with ball. 30 sec each: pound dribble R/L, crossover, between legs, behind back, combos. Athletic stance, eyes up."},
{i:"b2",n:"Two-Ball Dribbling",c:"Ball Handling",d:7,v:"High",p:"All",t:"Two balls per player. Both same time, alternating, one high/one low, crossover both. Walk baseline to baseline, then jog."},
{i:"b3",n:"Cone Dribble Course",c:"Ball Handling",d:8,v:"Medium",p:"All",t:"6-8 cones zigzag. Crossover at each cone. Variations: between legs, behind back, spin. Time each player for competition."},
{i:"b4",n:"Tennis Ball Dribbling",c:"Ball Handling",d:6,v:"High",p:"Pairs",t:"Dribble one hand, partner tosses tennis ball. Catch and return while dribbling. Switch hands. Builds hand-eye coordination."},
{i:"b5",n:"Full-Court Attack Dribbles",c:"Ball Handling",d:7,v:"High",p:"All",t:"4 lines on baseline. Sprint dribble to half, crossover, attack to FT line, behind-back, finish layup. Cycle through moves."},

// Drag-and-drop state
var dragIdx=null;
function dStart(e,j){
  dragIdx=j;
  var el=e.currentTarget.closest('.pi');
  el.classList.add('dragging');
  if(e.dataTransfer){e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',j);}
}
function dOver(e,j){
  e.preventDefault();if(e.dataTransfer)e.dataTransfer.dropEffect='move';
  var items=document.querySelectorAll('#pdr .pi');
  items.forEach(function(el){el.classList.remove('drag-over');});
  if(dragIdx!==null&&dragIdx!==j)items[j].classList.add('drag-over');
}
function dDrop(e,j){
  e.preventDefault();
  if(dragIdx===null||dragIdx===j){dEnd();return;}
  var it=P.splice(dragIdx,1)[0];
  P.splice(j,0,it);
  dragIdx=null;
  rpl();
}
function dEnd(){
  dragIdx=null;
  var items=document.querySelectorAll('#pdr .pi');
  items.forEach(function(el){el.classList.remove('dragging');el.classList.remove('drag-over');});
}
// Touch drag-and-drop
var touchDragIdx=null,touchClone=null,touchStartY=0,touchCurY=0;
function tDragStart(e,j){
  touchDragIdx=j;touchStartY=e.touches[0].clientY;touchCurY=touchStartY;
  var el=e.currentTarget.closest('.pi');
  el.classList.add('dragging');
  // Prevent scroll while dragging
  document.body.style.overflow='hidden';
}
function tDragMove(e){
  if(touchDragIdx===null)return;
  e.preventDefault();
  touchCurY=e.touches[0].clientY;
  var items=document.querySelectorAll('#pdr .pi');
  items.forEach(function(el,i){
    el.classList.remove('drag-over');
    var r=el.getBoundingClientRect();
    if(i!==touchDragIdx&&touchCurY>=r.top&&touchCurY<=r.bottom){
      el.classList.add('drag-over');
    }
  });
}
function tDragEnd(e){
  if(touchDragIdx===null)return;
  document.body.style.overflow='';
  var items=document.querySelectorAll('#pdr .pi');
  var dropIdx=-1;
  items.forEach(function(el,i){
    if(el.classList.contains('drag-over'))dropIdx=i;
    el.classList.remove('drag-over');el.classList.remove('dragging');
  });
  if(dropIdx>=0&&dropIdx!==touchDragIdx){
    var it=P.splice(touchDragIdx,1)[0];
    P.splice(dropIdx,0,it);
    rpl();
  }
  touchDragIdx=null;
}
function ub(){
  var b=document.getElementById("bdg");

function buildWeights(cfg){
  var base={
    "Warmup":.08,"Ball Handling":.08,"Passing":.06,"Full Court":.08,
    "Shooting":.13,"Offense":.14,"Defense":.12,"Scrimmage":.16,
    "Conditioning":.07,"Cool Down":.06,"Situational":.02
  };
  var profiles={
    balanced:{},
    gameprep:{"Scrimmage":.25,"Situational":.12,"Offense":.14,"Defense":.12,"Shooting":.08,"Ball Handling":.04,"Passing":.04,"Full Court":.06,"Conditioning":.03},
    skill:{"Ball Handling":.16,"Shooting":.18,"Passing":.12,"Full Court":.10,"Offense":.10,"Defense":.08,"Scrimmage":.06,"Conditioning":.04},
    defensive:{"Defense":.25,"Situational":.12,"Scrimmage":.16,"Conditioning":.10,"Offense":.06,"Shooting":.06,"Ball Handling":.04,"Passing":.04,"Full Court":.06},
    offensive:{"Offense":.22,"Shooting":.18,"Passing":.10,"Full Court":.10,"Scrimmage":.14,"Ball Handling":.06,"Defense":.04,"Conditioning":.04},
    conditioning:{"Conditioning":.22,"Full Court":.18,"Defense":.12,"Scrimmage":.14,"Ball Handling":.08,"Shooting":.06,"Offense":.04,"Passing":.04},
    light:{"Shooting":.22,"Ball Handling":.14,"Passing":.12,"Offense":.12,"Cool Down":.12,"Warmup":.12,"Full Court":.06,"Defense":.04,"Conditioning":0,"Scrimmage":.04},
    shooting:{"Shooting":.30,"Passing":.10,"Ball Handling":.08,"Offense":.10,"Full Court":.08,"Scrimmage":.10,"Defense":.06,"Conditioning":.04}
  };
  var w={};var p=profiles[cfg.type]||{};
  var cats=[];var s={};
  for(var j=0;j<D.length;j++){if(!s[D[j].c]){s[D[j].c]=1;cats.push(D[j].c);}}
  for(var j=0;j<cats.length;j++){
    var c=cats[j];
    w[c]=p[c]!==undefined?p[c]:(base[c]||.05);
  }
  for(var j=0;j<cfg.emphasis.length;j++){
    var ec=cfg.emphasis[j];
    if(w[ec]!==undefined)w[ec]=Math.min(w[ec]*1.6+.05,.35);
  }
  if(cfg.notes){
    for(var c in w){
      if(cfg.notes.indexOf(c.toLowerCase())>-1)w[c]=Math.min(w[c]*1.4+.04,.30);
    }
    var kw={"press":"Defense","free throw":"Shooting","layup":"Shooting","transition":"Full Court","fast break":"Full Court","ball handling":"Ball Handling","dribble":"Ball Handling","passing":"Passing","screen":"Offense","motion":"Offense","zone":"Defense","rebound":"Defense","closeout":"Defense","3 point":"Shooting","three point":"Shooting","scrimmage":"Scrimmage","conditioning":"Conditioning","shooting":"Shooting"};
    for(var k in kw){
      if(cfg.notes.indexOf(k)>-1&&w[kw[k]]!==undefined)w[kw[k]]=Math.min(w[kw[k]]*1.4+.04,.30);
    }
  }
  w["Warmup"]=Math.max(w["Warmup"]||.08,.06);
  w["Cool Down"]=Math.max(w["Cool Down"]||.06,.04);
  var tot=0;for(var c in w)tot+=w[c];
  for(var c in w)w[c]=w[c]/tot;
  return w;
}

function pickDrills(w,cfg){
  var plan=[];
  var imap={"Low":1,"Medium":2,"High":3,"Very High":4};
  var tgt=imap[cfg.intensity]||2;
  var ordered=[];for(var c in w){if(w[c]>0)ordered.push({c:c,w:w[c]});}
  ordered.sort(function(a,b){
    if(a.c==="Warmup")return -1;if(b.c==="Warmup")return 1;
    if(a.c==="Cool Down")return 1;if(b.c==="Cool Down")return -1;
    return b.w-a.w;
  });
  var used={};
  for(var j=0;j<ordered.length;j++){
    var cat=ordered[j].c,cw=ordered[j].w;
    var tm=Math.round(cfg.dur*cw);
    if(tm<3)continue;
    var pool=[];
    for(var k=0;k<D.length;k++){
      if(D[k].c===cat&&!used[D[k].i]){
        var di=imap[D[k].v]||2;
        var diff=Math.abs(di-tgt);
        pool.push({d:D[k],sc:diff});
      }
    }
    if(pool.length===0)continue;
    pool.sort(function(a,b){return a.sc-b.sc;});
    var top=[];var best=pool[0].sc;
    for(var k=0;k<pool.length;k++){if(pool[k].sc<=best+1)top.push(pool[k].d);}
    if(tm>15&&top.length>1){
      var t1=Math.round(tm*.55),t2=tm-t1;
      if(t1>=3&&t2>=3){
        var p1=top[Math.floor(Math.random()*top.length)];
        used[p1.i]=1;
        var top2=[];for(var k=0;k<top.length;k++){if(!used[top[k].i])top2.push(top[k]);}
        if(top2.length>0){
          var p2=top2[Math.floor(Math.random()*top2.length)];
          used[p2.i]=1;
          plan.push({di:p1.i,du:t1});
          plan.push({di:p2.i,du:t2});
          continue;
        }
      }
    }
    var pk=top[Math.floor(Math.random()*top.length)];
    used[pk.i]=1;
    plan.push({di:pk.i,du:tm});
  }
  return plan;
}

// === RUN PRACTICE MODE ===
var RUN={active:false,paused:true,start:0,elapsed:0,pauseStart:0,totalPaused:0,items:[],curIdx:-1,drillTimer:null,drillStart:0,drillPaused:0,drillTotalPaused:0,audioCtx:null};

function getAudioCtx(){
  if(!RUN.audioCtx){try{RUN.audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  return RUN.audioCtx;
}
function playAlarm(){
  var ctx=getAudioCtx();if(!ctx)return;
  var t=ctx.currentTime;
  for(var i=0;i<3;i++){
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type="square";o.frequency.value=880;
    g.gain.setValueAtTime(0.3,t+i*0.3);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.3+0.25);
    o.start(t+i*0.3);o.stop(t+i*0.3+0.25);
  }
}

function fmtTime(sec){
  var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  return (h>0?(h<10?"0":"")+h+":":"")+(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
}

function startRun(){
  if(P.length===0)return;
  RUN.items=[];
  for(var j=0;j<P.length;j++){
    var it=P[j],d=gd(it.di);
    RUN.items.push({di:it.di,du:it.du,name:d?d.n:"Drill",cat:d?d.c:"",desc:d?d.t:"",done:false,elapsed:0,notes:"",started:false});
  }
  RUN.active=false;RUN.paused=true;RUN.elapsed=0;RUN.totalPaused=0;RUN.curIdx=-1;
  document.getElementById("t3").style.display="";
  document.getElementById("rsum").style.display="none";
  rrnd();
  stab("r");
}

function rtgl(){
  var ctx=getAudioCtx();if(ctx&&ctx.state==="suspended")ctx.resume();
  if(!RUN.active){
    RUN.active=true;RUN.paused=false;RUN.start=Date.now();RUN.totalPaused=0;
    if(RUN.curIdx<0)rsetCur(0);
    document.getElementById("rbtn").innerHTML="&#10074;&#10074; Pause";
    document.getElementById("rbtn").className="rb rbs pau";
    document.getElementById("rebtn").style.display="";
    rclkTick();
  }else if(RUN.paused){
    RUN.paused=false;
    RUN.totalPaused+=Date.now()-RUN.pauseStart;
    if(RUN.items[RUN.curIdx]&&RUN.items[RUN.curIdx].started){
      RUN.drillTotalPaused+=Date.now()-RUN.pauseStart;
    }
    document.getElementById("rbtn").innerHTML="&#10074;&#10074; Pause";
    document.getElementById("rbtn").className="rb rbs pau";
    rclkTick();
  }else{
    RUN.paused=true;RUN.pauseStart=Date.now();
    document.getElementById("rbtn").innerHTML="&#9654; Resume";
    document.getElementById("rbtn").className="rb rbs";
  }
}

function rclkTick(){
  if(!RUN.active||RUN.paused)return;
  var now=Date.now();
  RUN.elapsed=Math.floor((now-RUN.start-RUN.totalPaused)/1000);
  document.getElementById("rclk").textContent=fmtTime(RUN.elapsed);
  var totalPlan=0;for(var j=0;j<RUN.items.length;j++)totalPlan+=RUN.items[j].du*60;
  var rem=Math.max(0,totalPlan-RUN.elapsed);
  document.getElementById("rrem").textContent=fmtTime(rem);
  var pct=totalPlan>0?Math.min(100,Math.round(RUN.elapsed/totalPlan*100)):0;
  document.getElementById("rpf").style.width=pct+"%";
  if(RUN.curIdx>=0&&RUN.items[RUN.curIdx]&&RUN.items[RUN.curIdx].started&&!RUN.items[RUN.curIdx].done){
    var di=RUN.items[RUN.curIdx];
    var de=Math.floor((now-RUN.drillStart-RUN.drillTotalPaused)/1000);
    di.elapsed=de;
    var drem=di.du*60-de;
    var el=document.getElementById("rdtm_"+RUN.curIdx);
    if(el){
      if(drem<=0){el.textContent="+"+fmtTime(Math.abs(drem));el.className="rtv exp";}
      else if(drem<=30){el.textContent=fmtTime(drem);el.className="rtv wrn";}
      else{el.textContent=fmtTime(drem);el.className="rtv";}
    }
    if(drem===0)playAlarm();
  }
  setTimeout(rclkTick,500);
}

function rsetCur(idx){
  if(idx<0||idx>=RUN.items.length)return;
  RUN.curIdx=idx;
  var it=RUN.items[idx];
  it.started=true;
  RUN.drillStart=Date.now();RUN.drillTotalPaused=0;
  rrnd();
}

function rchk(idx){
  var it=RUN.items[idx];
  it.done=!it.done;
  if(it.done&&it.started){it.elapsed=Math.floor((Date.now()-RUN.drillStart-RUN.drillTotalPaused)/1000);}
  rrnd();
}

function rnxt(idx){
  RUN.items[idx].done=true;
  if(RUN.items[idx].started){
    RUN.items[idx].elapsed=Math.floor((Date.now()-RUN.drillStart-RUN.drillTotalPaused)/1000);
  }
  var next=-1;
  for(var j=idx+1;j<RUN.items.length;j++){if(!RUN.items[j].done){next=j;break;}}
  if(next>=0)rsetCur(next);
  else rrnd();
}

function rnote(idx,val){RUN.items[idx].notes=val;}

function rrnd(){
  var el=document.getElementById("rlist");
  var h="";
  for(var j=0;j<RUN.items.length;j++){
    var it=RUN.items[j],isCur=j===RUN.curIdx&&!it.done;
    h+="<div class=\"ri"+(isCur?" act":"")+(it.done?" dn":"")+"\">";
    h+="<div class=\"rit\">";
    h+="<div class=\"ric"+(it.done?" chk":"")+"\" onclick=\"rchk("+j+")\">&#10003;</div>";
    h+="<div class=\"rib\"><div class=\"rin\">"+(j+1)+". "+it.name+"</div><div class=\"rict\">"+it.cat+" &middot; "+it.du+" min</div></div>";
    h+="<div class=\"rtm\">";
    if(isCur&&it.started){h+="<div class=\"rtv\" id=\"rdtm_"+j+"\">"+fmtTime(it.du*60)+"</div><div class=\"rtl\">remaining</div>";}
    else if(it.done){h+="<div class=\"rtv\" style=\"font-size:14px;color:var(--g5)\">"+fmtTime(it.elapsed)+"</div><div class=\"rtl\">actual</div>";}
    else{h+="<div class=\"rtv\" style=\"font-size:16px;color:var(--g5)\">"+it.du+"m</div>";}
    h+="</div></div>";
    if(isCur){
      h+="<div class=\"rta\">";
      h+="<button class=\"rtb rtbs\" onclick=\"rnxt("+j+")\">&#10003; Done &amp; Next</button>";
      h+="</div>";
    }
    if(it.done||isCur){
      h+="<textarea class=\"rnt\" rows=\"1\" placeholder=\"Notes for this drill...\" oninput=\"rnote("+j+",this.value)\" onclick=\"event.stopPropagation()\">"+it.notes+"</textarea>";
    }
    h+="</div>";
  }
  el.innerHTML=h;
}

function rend(){
  if(!confirm("End this practice?"))return;
  RUN.active=false;RUN.paused=true;
  var el=document.getElementById("rsum");
  var done=0,totalActual=0;
  for(var j=0;j<RUN.items.length;j++){if(RUN.items[j].done){done++;totalActual+=RUN.items[j].elapsed;}}
  var h="<div class=\"rsm\">";
  h+="<h3>&#128203; Practice Summary</h3>";
  h+="<div class=\"rsr\"><span>Total Time</span><span>"+fmtTime(RUN.elapsed)+"</span></div>";
  h+="<div class=\"rsr\"><span>Drills Completed</span><span>"+done+" / "+RUN.items.length+"</span></div>";
  h+="<div class=\"rsr\"><span>Planned Duration</span><span>"+dur+" min</span></div>";
  h+="<div style=\"margin-top:14px\">";
  for(var j=0;j<RUN.items.length;j++){
    var it=RUN.items[j];
    h+="<div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--brd)\">";
    h+="<div style=\"flex:1\"><span style=\"color:"+(it.done?"var(--tlb)":"var(--g6)")+";margin-right:6px\">"+(it.done?"&#10003;":"&#9711;")+"</span>";
    h+="<span style=\"color:"+(it.done?"var(--wh)":"var(--g6)")+"\">"+(j+1)+". "+it.name+"</span></div>";
    h+="<span style=\"color:var(--g4);font-size:12px\">"+(it.done?fmtTime(it.elapsed):"skipped")+"</span></div>";
    if(it.notes){h+="<div style=\"padding:4px 0 8px 24px;font-size:12px;color:var(--g4);font-style:italic\">&#128221; "+it.notes+"</div>";}
  }
  h+="</div>";
  h+="<div class=\"rsn\"><label>Overall Practice Notes</label>";
  h+="<textarea id=\"rnotes\" rows=\"3\" placeholder=\"How did practice go? Key takeaways, adjustments for next time...\"></textarea></div>";
  h+="<div class=\"rsx\">";
  h+="<button class=\"mb mp\" onclick=\"rsavLog()\">&#128190; Save Log</button>";
  h+="<button class=\"mb ms\" onclick=\"rclr()\">&#128259; New Practice</button>";
  h+="</div></div>";
  el.innerHTML=h;el.style.display="block";
  document.getElementById("rlist").style.display="none";
  document.getElementById("rbtn").innerHTML="&#9654; Start Practice";
  document.getElementById("rbtn").className="rb rbs";
  document.getElementById("rebtn").style.display="none";
}

function rsavLog(){
  var log={date:document.getElementById("md").value||new Date().toISOString().slice(0,10),coach:document.getElementById("mc").value||"",team:document.getElementById("mt").value||"Shark City Hoops",focus:document.getElementById("mf").value||"",duration:RUN.elapsed,planned:dur,drills:[],notes:document.getElementById("rnotes")?document.getElementById("rnotes").value:""};
  for(var j=0;j<RUN.items.length;j++){
    var it=RUN.items[j];
    log.drills.push({name:it.name,cat:it.cat,planned:it.du*60,actual:it.elapsed,done:it.done,notes:it.notes});
  }
  try{
    var logs=JSON.parse(localStorage.getItem("sch_practice_logs")||"[]");
    logs.push(log);localStorage.setItem("sch_practice_logs",JSON.stringify(logs));
    alert("Practice log saved! ("+logs.length+" total logs)");
  }catch(e){alert("Could not save log: "+e.message);}
}

function rclr(){
  RUN.active=false;RUN.paused=true;RUN.elapsed=0;RUN.curIdx=-1;RUN.items=[];
  document.getElementById("rclk").textContent="00:00:00";
  document.getElementById("rrem").textContent="--:--";
  document.getElementById("rpf").style.width="0%";
  document.getElementById("rlist").style.display="";
  document.getElementById("rsum").style.display="none";
  document.getElementById("rbtn").innerHTML="&#9654; Start Practice";
  document.getElementById("rbtn").className="rb rbs";
  document.getElementById("rebtn").style.display="none";
  stab("p");
}
// === END RUN PRACTICE MODE ===

function init(){
  if(init.done)return;init.done=true;
  loadCustomDrills();
  var d=new Date();
  var mm=("0"+(d.getMonth()+1)).slice(-2);
  var dd=("0"+d.getDate()).slice(-2);
  document.getElementById("md").value=d.getFullYear()+"-"+mm+"-"+dd;
  rpls();rdr();rpl();ub();
}
init.done=false;
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init);}
else{init();}
window.onload=init;
setTimeout(init,100);
setTimeout(init,500);
}catch(e){
  document.getElementById("err").style.display="block";
  document.getElementById("err").textContent="Error: "+e.message;
}

</script>

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}
</script>
